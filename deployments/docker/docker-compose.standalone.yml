version: '3.8'

services:
  apicerberus:
    image: apicerberus/apicerberus:v1.0.0
    container_name: apicerberus-gateway
    ports:
      - "8080:8080"
      - "8443:8443"
      - "8081:8081"
    volumes:
      - ./config:/etc/apicerberus
      - apicerberus-data:/data
    environment:
      - APICERBERUS_LOG_LEVEL=info
      - APICERBERUS_JWT_SECRET=${JWT_SECRET:-changeme}
      - APICERBERUS_ADMIN_API_KEY=${ADMIN_API_KEY:-changeme}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - apicerberus

volumes:
  apicerberus-data:

networks:
  apicerberus:
    driver: bridge
