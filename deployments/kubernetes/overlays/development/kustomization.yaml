apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apicerberus-dev

resources:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: development

replicas:
  - name: apicerberus
    count: 1

images:
  - name: ghcr.io/apicerberus/apicerberus
    newTag: dev

patches:
  - target:
      kind: ConfigMap
      name: apicerberus-config
    patch: |-
      - op: replace
        path: /data/apicerberus.yaml
        value: |
          gateway:
            http_addr: ":8080"
            read_timeout: "30s"
            write_timeout: "30s"
            idle_timeout: "120s"
            grpc:
              enabled: true
              addr: ":50051"
          admin:
            addr: ":9876"
            ui_enabled: true
            ui_path: "/dashboard"
          portal:
            enabled: true
            addr: ":9877"
            path_prefix: "/portal"
          logging:
            level: "debug"
            format: "text"
            output: "stdout"
          store:
            path: "/data/apicerberus.db"
            journal_mode: "WAL"
          billing:
            enabled: true
            default_cost: 1
            test_mode_enabled: true
          tracing:
            enabled: false
          redis:
            enabled: false
            fallback_to_local: true
          audit:
            enabled: true
            retention_days: 7
          cluster:
            enabled: false
          auth:
            api_key:
              key_names:
                - "X-API-Key"
          global_plugins: []

  - target:
      kind: Deployment
      name: apicerberus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"

  - target:
      kind: HorizontalPodAutoscaler
      name: apicerberus
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  - target:
      kind: Ingress
      name: apicerberus
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dev-api.apicerberus.local
      - op: replace
        path: /spec/rules/1/host
        value: dev-admin.apicerberus.local
      - op: replace
        path: /spec/rules/2/host
        value: dev-portal.apicerberus.local
      - op: replace
        path: /spec/tls/0/hosts
        value:
          - dev-api.apicerberus.local
          - dev-admin.apicerberus.local
          - dev-portal.apicerberus.local
