# =============================================================================
# APICerebrus Docker Compose - Development
# =============================================================================
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose down           # Stop all services
#   docker-compose logs -f        # Follow logs
#   docker-compose ps             # List running services
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # APICerebrus Gateway
  # ---------------------------------------------------------------------------
  apicerberus:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: dev
        COMMIT: ${COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: apicerberus/apicerberus:dev
    container_name: apicerberus-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"    # HTTP Gateway
      - "8443:8443"    # HTTPS Gateway
      - "9876:9876"    # Admin API
      - "9877:9877"    # Portal
      - "50051:50051"  # gRPC
    volumes:
      - ./config:/config:ro
      - apicerberus-data:/data
      - ./certs:/certs:ro
    environment:
      - APICERBERUS_CONFIG=/config/apicerberus.yaml
      - APICERBERUS_DATA_DIR=/data
      - APICERBERUS_LOG_LEVEL=${LOG_LEVEL:-info}
      - APICERBERUS_JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in environment or .env file}
      - APICERBERUS_ADMIN_API_KEY=${ADMIN_API_KEY:?ADMIN_API_KEY must be set in environment or .env file}
    networks:
      - apicerberus-network
    healthcheck:
      test: ["CMD", "/app/apicerberus", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Redis (Optional - for distributed rate limiting and caching)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: apicerberus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - apicerberus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ---------------------------------------------------------------------------
  # Prometheus (Optional - for metrics collection)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: apicerberus-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - apicerberus-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  # ---------------------------------------------------------------------------
  # Grafana (Optional - for metrics visualization)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: apicerberus-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployments/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/apicerberus.json:ro
    networks:
      - apicerberus-network
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER must be set}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

volumes:
  apicerberus-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  apicerberus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
